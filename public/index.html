<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Command Center</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --accent: #7c6af0;
    --accent2: #4fd1c7;
    --green: #48bb78;
    --yellow: #f6c90e;
    --red: #fc8181;
    --google: #4285f4;
    --anthropic: #d97706;
    --openai: #10b981;
    --other: #7c6af0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo { font-size: 15px; font-weight: bold; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--accent2); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .refresh-btn {
    background: var(--border);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    touch-action: manipulation;
  }
  .refresh-btn:hover, .refresh-btn:active { background: var(--accent); color: #fff; }

  /* NAV TABS */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 12px;
    overflow-x: auto;
    gap: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 13px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  nav button:hover, nav button:active { color: var(--text); }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* STATS BAR */
  .stats-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; background: var(--surface); padding: 12px 16px; min-width: 80px; }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .stat-value { font-size: 20px; font-weight: bold; color: var(--accent2); }

  /* MAIN */
  main { padding: 16px; max-width: 1200px; }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:hover, .filter-btn:active { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    width: 200px;
    max-width: 100%;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .source-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
  }
  .source-select:focus { outline: none; border-color: var(--accent); }

  /* ARTICLE CARDS */
  .articles-grid { display: flex; flex-direction: column; gap: 10px; }
  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    transition: border-color 0.15s;
  }
  .article-card:hover { border-color: var(--accent); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .card-title { font-size: 14px; font-weight: bold; color: var(--text); line-height: 1.4; }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .badge { padding: 2px 8px; border-radius: 3px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }
  .badge-google { background: rgba(66,133,244,0.15); color: var(--google); border: 1px solid rgba(66,133,244,0.3); }
  .badge-anthropic { background: rgba(217,119,6,0.15); color: var(--anthropic); border: 1px solid rgba(217,119,6,0.3); }
  .badge-openai { background: rgba(16,185,129,0.15); color: var(--openai); border: 1px solid rgba(16,185,129,0.3); }
  .badge-other { background: rgba(124,106,240,0.15); color: var(--other); border: 1px solid rgba(124,106,240,0.3); }
  .badge-source { background: var(--border); color: var(--muted); border: 1px solid var(--border); }
  .card-summary { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
  .card-footer { display: flex; align-items: center; gap: 12px; }
  .card-date { font-size: 10px; color: var(--muted); }

  /* STATUS STATES */
  .status-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
  .status-msg.error { color: var(--red); }
  .loader {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SEED SECTIONS */
  .seed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

  /* INTERACTIVE SEED CARDS */
  .seed-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }
  .seed-card:hover { border-color: var(--accent); }
  .seed-card:active { background: rgba(124,106,240,0.07); border-color: var(--accent); }
  .seed-card::after {
    content: '›';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    pointer-events: none;
  }
  .seed-card h3 { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: var(--text); padding-right: 16px; }
  .seed-card p { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; padding-right: 8px; }
  .seed-card .meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { background: var(--border); color: var(--muted); padding: 2px 8px; border-radius: 3px; font-size: 10px; letter-spacing: 1px; }
  .tag.green { background: rgba(72,187,120,0.15); color: var(--green); }
  .tag.yellow { background: rgba(246,201,14,0.15); color: var(--yellow); }
  .tag.red { background: rgba(252,129,129,0.15); color: var(--red); }
  .tag.blue { background: rgba(66,133,244,0.15); color: var(--google); }
  .progress-bar { background: var(--border); border-radius: 4px; height: 6px; margin: 8px 0; }
  .progress-fill { height: 100%; border-radius: 4px; background: var(--accent); }
  .money-price { font-size: 18px; font-weight: bold; color: var(--accent2); margin: 6px 0; }
  .prompt-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    font-size: 11px;
    color: var(--accent2);
    line-height: 1.5;
    white-space: pre-wrap;
    margin: 8px 0;
    max-height: 100px;
    overflow-y: auto;
    pointer-events: none;
  }

  /* CERTS TABLE */
  .cert-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
  th { text-align: left; padding: 8px 12px; color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 12px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr.cert-row { cursor: pointer; transition: background 0.12s; touch-action: manipulation; }
  tr.cert-row:hover td, tr.cert-row:active td { background: rgba(124,106,240,0.08); }
  tr.cert-row td:last-child { color: var(--muted); }

  /* ════════════════════════════════════════
     DRAWER SYSTEM
  ════════════════════════════════════════ */
  #drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    touch-action: none;
  }
  #drawer-overlay.open { display: block; }

  #drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    z-index: 201;
    max-height: 85vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    overscroll-behavior: contain;
  }
  #drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .drawer-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 16px 20px 12px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-title {
    font-size: 15px;
    font-weight: bold;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }
  .drawer-close {
    background: var(--border);
    border: none;
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: inherit;
    touch-action: manipulation;
  }
  .drawer-close:hover, .drawer-close:active { background: var(--accent); color: #fff; }
  .drawer-body { padding: 16px 20px 32px; }
  .drawer-section { margin-bottom: 16px; }
  .drawer-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .drawer-text { font-size: 13px; color: var(--text); line-height: 1.6; }
  .drawer-muted { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .drawer-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .drawer-price { font-size: 24px; font-weight: bold; color: var(--accent2); margin: 4px 0; }
  .drawer-progress-wrap { margin: 8px 0; }
  .drawer-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .drawer-progress-bar { background: var(--border); border-radius: 4px; height: 8px; }
  .drawer-progress-fill { height: 100%; border-radius: 4px; background: var(--accent); }
  .drawer-prompt-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.6;
    white-space: pre-wrap;
    font-family: 'Courier New', monospace;
    word-break: break-word;
  }
  .drawer-action-btn {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    width: 100%;
    margin-top: 8px;
    touch-action: manipulation;
  }
  .drawer-action-btn:hover, .drawer-action-btn:active { background: #6557d4; }
  .drawer-copy-btn {
    background: var(--border);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    touch-action: manipulation;
  }
  .drawer-copy-btn:hover, .drawer-copy-btn:active { border-color: var(--accent2); color: var(--accent2); }

  /* SECTION HEADER ROW */
  .section-hdr {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Mobile responsive tweaks */
  @media (max-width: 480px) {
    main { padding: 12px; }
    .seed-grid { grid-template-columns: 1fr; }
    .stat { padding: 10px 12px; }
    .stat-value { font-size: 18px; }
    header { padding: 12px 16px; }
  }
</style>
</head>

      <button class="filter-btn" data-vendor="other" onclick="setVendor('other',this)">Other</button>
      <button class="filter-btn" data-vendor="google" onclick="setVendor('google',this)">Google</button>

      <button class="filter-btn" onclick="filterCards('learning-cards','not-started',this)">Not Started</button>
      <button class="filter-btn" onclick="filterCards('learning-cards','free',this)">Free</button>
    </div>
    <div class="seed-grid" id="learning-cards"></div>
  </div>

  <!-- CERTIFICATES -->
  <div id="section-certs" class="section">
    <div class="section-hdr">Tap a row to see details</div>
    <div class="cert-table-wrap">
      <table>
        <thead><tr>
          <th>Certificate</th><th>Platform</th><th>Status</th><th>Credibility</th><th>Job Value</th>
        </tr></thead>
        <tbody id="cert-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- PROJECTS -->
  <div id="section-projects" class="section">
    <div class="seed-grid" id="project-cards"></div>
  </div>

  <!-- SKILLS -->
  <div id="section-skills" class="section">
    <div class="seed-grid" id="skill-cards"></div>
  </div>

  <!-- PROMPTS -->
  <div id="section-prompts" class="section">
    <div class="filters">
      <button class="filter-btn active" onclick="filterCards('prompt-cards','all',this)">All</button>
      <button class="filter-btn" onclick="filterCards('prompt-cards','make',this)">Make</button>
      <button class="filter-btn" onclick="filterCards('prompt-cards','gemini',this)">Gemini</button>
      <button class="filter-btn" onclick="filterCards('prompt-cards','airtable',this)">Airtable</button>
    </div>
    <div class="seed-grid" id="prompt-cards"></div>
  </div>

  <!-- MONEY -->
  <div id="section-money" class="section">
    <div class="seed-grid" id="money-cards"></div>
  </div>

</main>

<!-- DRAWER OVERLAY -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- DETAIL DRAWER -->
<div id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title">Detail</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

function copyPrompt(id) {
  const item = promptData.find(x => x.id === id);
  if (!item) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(item.prompt).then(() => {
      const btn = document.querySelector('.drawer-copy-btn');
      if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.textContent = '📋 Copy Prompt'; }, 2000); }
    });
  } else {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = item.prompt;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.querySelector('.drawer-copy-btn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.textContent = '📋 Copy Prompt'; }, 2000); }
  }
}

// ══════════════════════════════════════════════════════
//  DRAWER SYSTEM
// ══════════════════════════════════════════════════════

function openDrawer(title, bodyHtml) {
  document.getElementById('drawer-title').textContent = title;
  document.getElementById('drawer-body').innerHTML = bodyHtml;
  const overlay = document.getElementById('drawer-overlay');
  const drawer = document.getElementById('drawer');
  overlay.classList.add('open');
  // Force reflow before adding open class for animation
  requestAnimationFrame(() => { drawer.classList.add('open'); });
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  const overlay = document.getElementById('drawer-overlay');
  const drawer = document.getElementById('drawer');
  drawer.classList.remove('open');
  setTimeout(() => {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }, 280);
}

// Close drawer on Escape key
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// Swipe down to close drawer
let touchStartY = 0;
document.getElementById('drawer').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('drawer').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80) closeDrawer();
}, { passive: true });

// ══════════════════════════════════════════════════════
//  FILTER + TABS
// ══════════════════════════════════════════════════════

function filterCards(containerId, tag, btn) {
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(containerId).querySelectorAll('.seed-card').forEach(card => {
    const tags = (card.dataset.tags || '').split(' ');
    card.style.display = (tag === 'all' || tags.includes(tag)) ? '' : 'none';
  });
}

function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  btn.classList.add('active');
}

// ══════════════════════════════════════════════════════
//  NEWS SECTION
// ══════════════════════════════════════════════════════

let allRecords = [];
let currentVendor = 'all';

function getField(fields, name) {
  if (fields[name] !== undefined) return fields[name];
  for (const key of Object.keys(fields)) {
    if (key.trim().toLowerCase() === name.trim().toLowerCase()) return fields[key];
  }
  return undefined;
}

function normVendor(v) {
  if (!v) return 'other';
  const s = String(v).trim().toLowerCase();
  if (s === 'google') return 'google';
  if (s === 'anthropic') return 'anthropic';
  if (s === 'openai') return 'openai';
  return 'other';
}

function setVendor(v, btn) {
  currentVendor = v;
  document.querySelectorAll('[data-vendor]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}

async function loadNews() {
  const container = document.getElementById('articles-container');
  container.innerHTML = '<div class="status-msg"><span class="loader"></span>Loading articles...</div>';
  try {
    const res = await fetch('/api/feed');
    if (!res.ok) { const t = await res.text(); throw new Error(`API ${res.status}: ${t}`); }
    const data = await res.json();
    if (data.error) throw new Error(data.error + (data.detail ? ' — ' + data.detail : ''));
    allRecords = data.records || [];
    if (allRecords.length === 0) { container.innerHTML = '<div class="status-msg">No articles found in Airtable.</div>'; return; }
    updateStats(); populateSourceFilter(); renderArticles();
  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="status-msg error">⚠ Could not load articles<br><br><span style="font-size:11px">${escHtml(err.message)}</span><br><br><span style="font-size:11px">Check: Vercel env var AIRTABLE_PAT is set for Production.</span></div>`;
    ['stat-total','stat-sources','stat-summarized','stat-today'].forEach(id => { document.getElementById(id).textContent = 'Err'; });
  }
}

function updateStats() {
  const total = allRecords.length;
  const sources = new Set(allRecords.map(r => { const v = getField(r.fields,'source name'); return v ? String(v).trim() : null; }).filter(Boolean)).size;
  const summarized = allRecords.filter(r => { const s = getField(r.fields,'Short summary') || getField(r.fields,'Short summ'); return s && String(s).trim().length > 0; }).length;
  const today = new Date().toISOString().split('T')[0];
  const todayCount = allRecords.filter(r => { const ct = r.createdTime || ''; const pd = getField(r.fields,'published date') || ''; return ct.startsWith(today) || pd.startsWith(today); }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-sources').textContent = sources;
  document.getElementById('stat-summarized').textContent = summarized;
  document.getElementById('stat-today').textContent = todayCount;
}

function populateSourceFilter() {
  const sel = document.getElementById('source-filter');
  const sources = [...new Set(allRecords.map(r => { const v = getField(r.fields,'source name'); return v ? String(v).trim() : null; }).filter(Boolean))].sort();
  sel.innerHTML = '<option value="all">All Sources</option>';
  sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
}

function renderArticles() {
  const container = document.getElementById('articles-container');
  const searchVal = document.getElementById('search').value.trim().toLowerCase();
  const sourceVal = document.getElementById('source-filter').value;
  let filtered = allRecords.filter(r => {
    const f = r.fields;
    const vendor = normVendor(getField(f,'vendor'));
    const sourceName = String(getField(f,'source name') || '').trim();
    const title = String(getField(f,'Title') || '').toLowerCase();
    const summary = String(getField(f,'Short summary') || getField(f,'Short summ') || '').toLowerCase();
    if (currentVendor !== 'all' && vendor !== currentVendor) return false;
    if (sourceVal !== 'all' && sourceName !== sourceVal) return false;
    if (searchVal && !title.includes(searchVal) && !summary.includes(searchVal)) return false;
    return true;
  });
  filtered.sort((a,b) => new Date(b.createdTime||0) - new Date(a.createdTime||0));
  if (filtered.length === 0) { container.innerHTML = '<div class="status-msg">No articles match your filters.</div>'; return; }
  const vendorLabels = { google:'Google', anthropic:'Anthropic', openai:'OpenAI', other:'Other' };
  container.innerHTML = filtered.map(r => {
    const f = r.fields;
    const title = getField(f,'Title') || 'Untitled';
    const url = getField(f,'URL') || '#';
    const vendor = normVendor(getField(f,'vendor'));
    const sourceName = String(getField(f,'source name') || '').trim() || 'Unknown';
    const summary = getField(f,'Short summary') || getField(f,'Short summ') || '';
    const rawDate = r.createdTime || '';
    let dateStr = '';
    if (rawDate) { const d = new Date(rawDate); dateStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
    return `<div class="article-card">
      <div class="card-top">
        <div class="card-title"><a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(title)}</a></div>
        <div class="card-badges">
          <span class="badge badge-${vendor}">${vendorLabels[vendor]}</span>
          <span class="badge badge-source">${escHtml(sourceName)}</span>
        </div>
      </div>
      ${summary ? `<div class="card-summary">${escHtml(String(summary))}</div>` : ''}
      <div class="card-footer">
        ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
